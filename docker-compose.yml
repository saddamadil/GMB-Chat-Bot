# ─────────────────────────────────────────────
#  docker-compose.yml
#  Local development with PostgreSQL included
#  Run: docker-compose up
# ─────────────────────────────────────────────

version: '3.8'

services:
  # ── GMB AI Agent App ──────────────────────
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://gmbuser:gmbpass@db:5432/gmbagent
      - PORT=3001
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  # ── PostgreSQL Database ───────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gmbagent
      POSTGRES_USER: gmbuser
      POSTGRES_PASSWORD: gmbpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gmbuser -d gmbagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
